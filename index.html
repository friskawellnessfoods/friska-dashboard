<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friska Admin Dashboard</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body{
font-family:system-ui;
background:#f4f6fb;
margin:0;
padding:20px;
transition:0.3s;
}

.dark{
background:#121212;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

h1{
font-size:26px;
color:#0a1a6e;
}

.dark h1{
color:#7f9bff;
}

.search{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
margin-bottom:25px;
font-size:16px;
}

.section{
margin-bottom:30px;
}

.section-title{
font-size:18px;
font-weight:700;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.card{
background:white;
padding:18px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
text-decoration:none;
color:#0a1a6e;
display:flex;
align-items:center;
gap:10px;
font-weight:600;
}

.dark .card{
background:#1f1f1f;
color:white;
}

.card:hover{
transform:scale(1.03);
}

.toggle{
cursor:pointer;
font-size:18px;
}

.lock-screen{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:#0a1a6e;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
}

.lock-screen input{
padding:10px;
border-radius:6px;
border:none;
margin-top:10px;
}

.lock-screen button{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:6px;
background:white;
color:#0a1a6e;
font-weight:700;
cursor:pointer;
}

</style>
</head>

<body>

<div class="lock-screen" id="lock">
<h2>Friska Admin Access</h2>
<input type="password" id="pass" placeholder="Enter password">
<button onclick="unlock()">Enter</button>
</div>

<header>
<h1>Friska Dashboard</h1>
<div class="toggle" onclick="toggleDark()">
<i class="fas fa-moon"></i>
</div>
</header>

<input class="search" placeholder="Search tools..." onkeyup="searchTools(this.value)">

<div id="tools">

<div class="section">
<div class="section-title">Kitchen</div>
<div class="grid">

<a class="card" href="KITCHEN_PANEL_LINK">
<i class="fas fa-list"></i>
Kitchen Panel
</a>

<a class="card" href="WEEKLY_MENU_LINK">
<i class="fas fa-utensils"></i>
Weekly Menu
</a>

</div>
</div>

<div class="section">
<div class="section-title">Client</div>
<div class="grid">

<a class="card" href="WEEKLY_CHOICE_LINK">
<i class="fas fa-calendar"></i>
Weekly Choice
</a>

<a class="card" href="ADMIN_CLIENT_LINK">
<i class="fas fa-user-plus"></i>
Client Onboarding
</a>

</div>
</div>

<div class="section">
<div class="section-title">Admin</div>
<div class="grid">

<a class="card" href="BILLING_CALC_LINK">
<i class="fas fa-calculator"></i>
Billing Calculator
</a>

<a class="card" href="QUOTE_GEN_LINK">
<i class="fas fa-file-invoice"></i>
Quote Generator
</a>

</div>
</div>

<div class="section">
<div class="section-title">System</div>
<div class="grid">

<a class="card" href="CACHE_CONTROL_LINK">
<i class="fas fa-database"></i>
Cache Control
</a>

</div>
</div>

</div>

<script>

const PASSWORD="friska";

function unlock(){
const p=document.getElementById("pass").value;
if(p===PASSWORD){
document.getElementById("lock").style.display="none";
}
else{
alert("Wrong password");
}
}

function toggleDark(){
document.body.classList.toggle("dark");
}

function searchTools(v){
v=v.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(v)?"flex":"none";
});
}

</script>

</body>
</html>
